{% extends "base.html" %}

{% block content %}
<div class="container mt-5 mb-5">
  <div class="mb-5">
    <h1 class="mb-2">Otros Recursos de Búsqueda</h1>
    <p class="text-muted">Otros sitios donde buscar personas reportadas</p>
  </div>

  <div class="row g-3">
    {% for recurso in recursos %}
    <div class="col-md-6 col-lg-4">
      <a href="{{ recurso.url }}" target="_blank" class="text-decoration-none h-100">
        <div class="card h-100 shadow-sm" style="border: none; transition: transform 0.2s;">
          <div class="card-body d-flex flex-column">
            <h5 class="card-title fw-bold text-primary mb-2">{{ recurso.nombre }}</h5>
            {% if recurso.descripcion %}
              <p class="card-text small text-muted flex-grow-1">{{ recurso.descripcion }}</p>
            {% endif %}
            <div class="mt-3">
              <small class="text-primary fw-500">Visitar →</small>
            </div>
          </div>
        </div>
      </a>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
